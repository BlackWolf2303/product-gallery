services:
  - type: web
    name: product-gallery-mcp
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run app:build
    startCommand: npm run app:start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
